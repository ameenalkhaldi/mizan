name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install "setuptools<72"
          pip install -e ".[dev,api]"

      - name: Smoke test - pyaramorph analyzer loads
        run: python -c "import pyaramorph; print(len(pyaramorph.Analyzer().stems), 'stems loaded')"

      - name: Smoke test - data files load
        run: python -c "import json; d=json.load(open('data/verb_transitivity.json')); print(len(d['verbs']), 'verbs loaded')"

      - name: Lint with ruff
        run: ruff check src/ mcp-server/ tests/

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/
          else
            echo "No tests/ directory yet - skipping"
          fi
